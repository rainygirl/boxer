<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Boxer</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📦</text></svg>" />
    <script>
      (function() {
        var t = localStorage.getItem('boxer_theme');
        if (t === 'blue' || t === 'dark') document.documentElement.classList.add('dark');
        if (t === 'dark') document.documentElement.classList.add('theme-black');
      })();
    </script>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover" class="h-screen overflow-hidden">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
